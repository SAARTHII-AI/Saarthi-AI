services:
  - type: web
    name: saarthi-ai
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.x
      # The application expects standard Azure configs which you should configure in the Render dashboard:
      # - key: AZURE_OPENAI_KEY
      #   sync: false
      # - key: AZURE_OPENAI_ENDPOINT
      #   sync: false
