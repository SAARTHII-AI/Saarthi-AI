AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: SaarthiAI Backend - FastAPI on AWS Lambda

Globals:
  Function:
    Timeout: 30
    MemorySize: 2048

Resources:
  SaarthiAiFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Architectures:
        - x86_64
      Events:
        SaarthiAiApi:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
    Metadata:
      Dockerfile: backend/Dockerfile.lambda
      DockerContext: .
      DockerTag: v1

Outputs:
  SaarthiAiApi:
    Description: "API Gateway endpoint URL for Prod stage"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
