version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install --upgrade pip
      # Repo root `requirements.txt` is canonical (same graph as `pip install -r backend/requirements.txt`).
      - pip install -r requirements.txt
run:
  runtime-version: "3.11"
  command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
  network:
    port: 8000
  env:
    - name: PYTHONPATH
      value: "."
    - name: ENV
      value: "production"
