<!doctype html>
<html lang="hi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SaarthiAI - Your Government Scheme Assistant</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="app-container">
      <header>
        <div class="logo">
          <i class="fa-solid fa-hands-holding-circle"></i>
          <h1>SaarthiAI</h1>
        </div>
        <div class="language-selector">
          <select id="language-select">
            <option value="hi">हिंदी (Hindi)</option>
            <option value="ta">தமிழ் (Tamil)</option>
            <option value="en">English</option>
          </select>
        </div>
      </header>

      <main class="chat-container">
        <div id="chat-box" class="chat-box">
          <div class="message bot-message">
            <div class="message-content">
              नमस्ते! मैं सारथी हूँ। मैं आपको सरकारी योजनाओं के बारे में जानकारी
              देने में मदद कर सकता हूँ। आप माइक बटन दबाकर मुझसे सवाल पूछ सकते
              हैं।
            </div>
          </div>
        </div>
      </main>

      <div class="input-area">
        <div class="status-indicator" id="status-indicator"></div>
        <button id="mic-btn" class="mic-btn">
          <i class="fa-solid fa-microphone"></i>
        </button>
        <div class="text-input-container">
          <input
            type="text"
            id="text-input"
            placeholder="या टाइप करें..."
            onkeypress="handleEnterKeyPress(event)"
          />
          <button id="send-btn" onclick="sendTextMessage()">
            <i class="fa-solid fa-paper-plane"></i>
          </button>
        </div>
      </div>
    </div>

    <script src="voice.js"></script>
    <script src="script.js"></script>
  </body>
</html>
