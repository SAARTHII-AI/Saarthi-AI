<!DOCTYPE html>
<html class="light" lang="hi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
    <title>SaarthiAI - Voice Assistant</title>

    <meta name="theme-color" content="#0f172a"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <link rel="manifest" href="manifest.json"/>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10a37f",
                        "primary-dark": "#0d8c6d",
                        "surface": "#ffffff",
                        "surface-secondary": "#f7f7f8",
                        "surface-dark": "#0f172a",
                        "surface-dark-secondary": "#1e293b",
                        "text-primary": "#0f172a",
                        "text-secondary": "#64748b",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.75rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px" },
                },
            },
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

    <style>
        body {
            min-height: 100dvh;
        }

        .listening {
            animation: listenPulse 1.5s ease-in-out infinite;
            background: linear-gradient(135deg, #10a37f 0%, #0d8c6d 50%, #059669 100%) !important;
        }

        .speaking {
            animation: speakGlow 2s ease-in-out infinite;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%) !important;
        }

        @keyframes listenPulse {
            0%   { box-shadow: 0 0 0 0 rgba(16, 163, 127, 0.6); transform: scale(1); }
            50%  { box-shadow: 0 0 0 20px rgba(16, 163, 127, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(16, 163, 127, 0); transform: scale(1); }
        }

        @keyframes speakGlow {
            0%   { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.5); transform: scale(1); }
            25%  { box-shadow: 0 0 0 12px rgba(139, 92, 246, 0.2); transform: scale(1.03); }
            50%  { box-shadow: 0 0 0 20px rgba(99, 102, 241, 0); transform: scale(1); }
            75%  { box-shadow: 0 0 0 12px rgba(139, 92, 246, 0.2); transform: scale(1.03); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); transform: scale(1); }
        }

        #chat-container::-webkit-scrollbar { display: none; }
        #chat-container { scrollbar-width: none; }

        .connectivity-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.03em;
        }
        .connectivity-pill::before {
            content: "";
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        .connectivity-pill.online {
            background: #dcfce7;
            color: #15803d;
        }
        .connectivity-pill.online::before {
            background: #22c55e;
        }
        .connectivity-pill.offline {
            background: #fef2f2;
            color: #b91c1c;
        }
        .connectivity-pill.offline::before {
            background: #ef4444;
        }

        .mic-disabled {
            opacity: 0.4;
            cursor: not-allowed !important;
            filter: grayscale(0.7);
        }

        #profile-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 50;
            backdrop-filter: blur(4px);
        }

        #profile-drawer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 1.5rem 1.5rem 0 0;
            z-index: 60;
            padding: 1.5rem;
            box-shadow: 0 -8px 40px rgba(0,0,0,0.15);
            max-height: 85vh;
            overflow-y: auto;
        }
        .dark #profile-drawer {
            background: #1e293b;
        }

        .message-fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .scheme-card:hover {
            border-color: #10a37f;
            box-shadow: 0 2px 12px rgba(16, 163, 127, 0.1);
        }
    </style>
</head>

<body class="bg-surface-secondary font-display text-text-primary min-h-screen flex justify-center">

    <div class="w-full max-w-[430px] h-[100dvh] bg-surface shadow-2xl relative flex flex-col overflow-hidden sm:rounded-[2rem] sm:my-4 sm:h-[calc(100dvh-2rem)] sm:max-h-[920px] border-x border-slate-100">

        <div class="flex items-center justify-between px-5 py-3 bg-white/90 backdrop-blur-lg z-40 sticky top-0 border-b border-slate-100">
            <div class="flex items-center gap-2.5">
                <div class="w-9 h-9 rounded-xl bg-primary flex items-center justify-center text-white shadow-sm">
                    <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1">agriculture</span>
                </div>
                <div class="flex flex-col">
                    <h1 class="text-lg font-bold tracking-tight text-slate-900 leading-none">SaarthiAI</h1>
                    <span id="connectivity-pill" class="connectivity-pill online mt-0.5">Online</span>
                </div>
            </div>

            <div class="flex items-center gap-2">
                <select id="language-select" class="appearance-none font-sans px-3 py-1.5 text-xs font-semibold rounded-full bg-slate-100 text-slate-600 border-none outline-none cursor-pointer text-center min-w-[90px]">
                    <option value="auto">Auto Detect</option>
                    <option value="hi">हिंदी</option>
                    <option value="en">English</option>
                </select>
                <button id="avatar-btn" class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 overflow-hidden active:scale-95 transition-transform" title="Farmer Profile">
                    <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1">person</span>
                </button>
            </div>
        </div>

        <div id="chat-container" class="flex-1 overflow-y-auto px-4 py-4 flex flex-col gap-4">

            <div id="chat-box" class="flex flex-col gap-3">

                <div class="flex items-start gap-2.5 max-w-[90%] message-fade-in">
                    <div class="w-7 h-7 rounded-full bg-primary flex items-center justify-center text-white shrink-0 mt-1">
                        <span class="material-symbols-outlined text-[15px]" style="font-variation-settings: 'FILL' 1">agriculture</span>
                    </div>
                    <div class="flex flex-col gap-1">
                        <span class="text-[11px] font-medium text-slate-400 ml-0.5">SaarthiAI</span>
                        <div class="bg-slate-50 rounded-2xl rounded-tl-md px-4 py-3">
                            <p class="text-[14px] leading-relaxed text-slate-700">
                                How can I help you today?<br/>
                                <span class="text-slate-500 mt-1 block">मैं आज आपकी कैसे मदद कर सकता हूँ?</span>
                            </p>
                        </div>
                    </div>
                </div>

            </div>

            <div id="scheme-filter" class="flex gap-2 mt-auto pt-2 px-0.5">
                <button id="filter-all" onclick="setSchemeFilter('all')" class="scheme-filter-btn active px-3 py-1.5 rounded-full text-xs font-semibold bg-primary text-white shadow-sm transition-all">All Schemes</button>
                <button id="filter-central" onclick="setSchemeFilter('central')" class="scheme-filter-btn px-3 py-1.5 rounded-full text-xs font-semibold bg-slate-100 text-slate-500 transition-all">Central</button>
                <button id="filter-state" onclick="setSchemeFilter('state')" class="scheme-filter-btn px-3 py-1.5 rounded-full text-xs font-semibold bg-slate-100 text-slate-500 transition-all hidden">State</button>
            </div>

            <div class="flex flex-wrap gap-1.5 pt-1 pb-1" id="suggestion-chips">
            </div>
        </div>

        <div class="px-4 pt-2 pb-6 bg-white border-t border-slate-100 z-40 relative">

            <div id="status-indicator" class="text-center text-xs font-medium text-slate-400 h-5 mb-1"></div>

            <div class="flex items-center justify-center mb-3">
                <button id="mic-btn" class="w-14 h-14 rounded-full bg-primary flex items-center justify-center text-white shadow-lg shadow-primary/25 active:scale-95 transition-all" title="Tap to speak">
                    <span class="material-symbols-outlined text-2xl">mic</span>
                </button>
            </div>

            <button id="stop-speech-btn" class="hidden w-full mb-2 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-xs font-semibold transition-colors flex items-center justify-center gap-1.5" onclick="window.stopSpeaking && window.stopSpeaking()">
                <span class="material-symbols-outlined text-[16px]">stop_circle</span>
                Stop Speaking
            </button>

            <div class="flex items-center gap-2 bg-slate-50 p-1.5 rounded-2xl">
                <input id="text-input" onkeypress="handleEnterKeyPress(event)" class="flex-1 bg-transparent border-none focus:ring-0 text-[14px] placeholder:text-slate-400 text-slate-800 px-3 py-2 h-10 outline-none" placeholder="Type a message..." type="text"/>
                <button id="send-btn" onclick="sendTextMessage()" class="p-2 bg-primary text-white rounded-xl w-9 h-9 flex items-center justify-center shadow-sm hover:bg-primary-dark transition-colors active:scale-95">
                    <span class="material-symbols-outlined text-[16px]">arrow_upward</span>
                </button>
            </div>

            <p id="mic-unsupported-hint" class="hidden text-center text-[11px] text-slate-400 mt-1.5">
                Voice not supported on this browser &mdash; please type.
            </p>
        </div>

        <div id="profile-overlay" class="hidden"></div>

        <div id="profile-drawer" class="hidden">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary">person</span>
                    Farmer Profile
                </h2>
                <button id="profile-cancel-btn" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 hover:text-slate-600 active:scale-95">
                    <span class="material-symbols-outlined text-xl">close</span>
                </button>
            </div>
            <p class="text-xs text-slate-500 mb-4">Your profile helps us recommend the best schemes for you. Saved locally on your device.</p>

            <div class="flex flex-col gap-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">State / राज्य</label>
                    <select id="profile-state" class="w-full rounded-xl border border-slate-200 bg-slate-50 text-slate-800 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
                        <option value="">Select state</option>
                        <option>Andhra Pradesh</option><option>Arunachal Pradesh</option><option>Assam</option>
                        <option>Bihar</option><option>Chhattisgarh</option><option>Goa</option>
                        <option>Gujarat</option><option>Haryana</option><option>Himachal Pradesh</option>
                        <option>Jharkhand</option><option>Karnataka</option><option>Kerala</option>
                        <option>Madhya Pradesh</option><option>Maharashtra</option><option>Manipur</option>
                        <option>Meghalaya</option><option>Mizoram</option><option>Nagaland</option>
                        <option>Odisha</option><option>Punjab</option><option>Rajasthan</option>
                        <option>Sikkim</option><option>Tamil Nadu</option><option>Telangana</option>
                        <option>Tripura</option><option>Uttar Pradesh</option><option>Uttarakhand</option>
                        <option>West Bengal</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Primary Crop / मुख्य फसल</label>
                    <input id="profile-crop" type="text" placeholder="e.g. Wheat, Paddy, Cotton…"
                        class="w-full rounded-xl border border-slate-200 bg-slate-50 text-slate-800 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary placeholder:text-slate-400"/>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Land Size (acres) / भूमि (एकड़)</label>
                    <input id="profile-land" type="number" min="0" step="0.1" placeholder="e.g. 2.5"
                        class="w-full rounded-xl border border-slate-200 bg-slate-50 text-slate-800 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary placeholder:text-slate-400"/>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Annual Income (₹) / वार्षिक आय</label>
                    <select id="profile-income" class="w-full rounded-xl border border-slate-200 bg-slate-50 text-slate-800 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
                        <option value="">Select range</option>
                        <option value="0-60000">Below ₹60,000</option>
                        <option value="60000-120000">₹60,000 – ₹1,20,000</option>
                        <option value="120000-300000">₹1,20,000 – ₹3,00,000</option>
                        <option value="300000+">Above ₹3,00,000</option>
                    </select>
                </div>
            </div>

            <button id="profile-save-btn" class="mt-5 w-full py-3 bg-primary text-white rounded-xl font-semibold text-sm shadow-sm hover:bg-primary-dark transition-colors active:scale-95">
                Save Profile / सहेजें
            </button>
        </div>

    </div>

    <script src="voice.js"></script>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(function(err) {
                console.warn('SW registration failed:', err);
            });
        }
    </script>
</body>
</html>
